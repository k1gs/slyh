app-id: ru.arabianq.slyh
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm20

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  append-ld-library-path: /usr/lib/sdk/llvm20/lib
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/slyh/cargo
    CARGO_TARGET_DIR: /run/build/slyh/target

command: slyh
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=ipc
  - --device=dri
  - --share=network
  - --filesystem=host

modules:
  - name: slyh
    buildsystem: simple
    build-commands:
      - cargo build --release --locked --offline
      - install -Dm755 /run/build/slyh/target/release/slyh -t /app/bin/
      - install -Dm644 assets/slyh.desktop /app/share/applications/ru.arabianq.slyh.desktop
      - install -Dm644 assets/icon.png /app/share/icons/hicolor/128x128/apps/ru.arabianq.slyh.png
      - install -Dm644 packages/flatpak/ru.arabianq.slyh.metainfo.xml -t /app/share/metainfo/
    sources:
      - type: dir
        path: ../../
      - cargo-sources.json
